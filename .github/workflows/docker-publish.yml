name: Build and Publish Docker Images

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------
      # Backend Build & Push
      # -----------------------------------------------------------
      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/tzeva-adom-backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------
      # Frontend Build & Push
      # -----------------------------------------------------------
      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/tzeva-adom-frontend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------
      # Trigger Redeploy (via Tailscale — server is on private network)
      # -----------------------------------------------------------
      - name: Connect to Tailscale
        if: env.PORTAINER_WEBHOOK_URL != '' && env.TAILSCALE_AUTHKEY != ''
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Trigger Portainer Redeploy Webhook
        if: env.PORTAINER_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [[ ! "$PORTAINER_WEBHOOK_URL" =~ /api/stacks/webhooks/ ]]; then
            echo "::warning::PORTAINER_WEBHOOK_URL does not look like a Portainer stack webhook endpoint"
          fi

          status_code=$(curl -sS -o /tmp/portainer-response.txt -w "%{http_code}" -X POST "$PORTAINER_WEBHOOK_URL" || true)
          echo "HTTP status: $status_code"

          if [[ "$status_code" -lt 200 || "$status_code" -ge 300 ]]; then
            echo "::warning::Portainer webhook returned HTTP $status_code — check PORTAINER_WEBHOOK_URL secret"
            echo "Response body:"
            cat /tmp/portainer-response.txt || true
          else
            echo "Portainer redeploy triggered successfully"
          fi
